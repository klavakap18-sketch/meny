<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор заданий</title>
<style>
  body { font-family: Arial; margin: 0; display: flex; height: 100vh; }
  .sidebar { width: 180px; background: #2d2d2d; color: #fff; display: flex; flex-direction: column; padding: 10px; overflow-y: auto;}
  .sidebar button { margin: 5px 0; padding: 10px; border: none; cursor: pointer; background: #444; color: #fff; }
  .sidebar button.active { background: #1e90ff; }

  .main { flex: 1; padding: 20px; position: relative; display: flex; flex-direction: column; }
  .score { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; border-radius: 50%; background: #1e90ff; color: #fff; display: flex; align-items:center; justify-content:center; font-weight: bold; font-size: 18px; }
  
  .task { flex: 1; margin: 20px 0; display: flex; flex-direction: column; }
  .task h2 { margin-bottom: 10px; }
  .task .options button { margin: 5px 0; padding: 10px; cursor: pointer; }

  .check-btn { padding: 10px 20px; background: #1e90ff; color: #fff; border: none; cursor: pointer; align-self: flex-start; margin-top: 10px; }

  .editor { margin-bottom: 20px; border: 1px solid #ccc; padding: 10px; }
  .editor input, .editor textarea { width: 100%; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <!-- Меню заданий -->
</div>

<div class="main">
  <div class="score" id="score">0</div>

  <!-- Редактор заданий -->
  <div class="editor" id="editor">
    <h3>Добавить новое задание</h3>
    <textarea id="question" placeholder="Вопрос"></textarea>
    <input type="text" placeholder="Вариант 1" id="opt0">
    <input type="text" placeholder="Вариант 2" id="opt1">
    <input type="text" placeholder="Вариант 3" id="opt2">
    <input type="number" placeholder="Номер правильного варианта (0,1,2)" id="answer" min="0" max="2">
    <button onclick="addTask()">Добавить задание</button>
  </div>

  <!-- Отображение текущего задания -->
  <div class="task" id="task">
    <h2>Здесь будет ваше задание</h2>
  </div>
  <button class="check-btn" id="checkBtn" onclick="checkAnswer()" style="display:none;">Проверить</button>
</div>

<script>
let tasks = [];
let currentTask = 0;
let score = 0;
let selectedAnswer = null;

// Добавление задания из редактора
function addTask() {
  const question = document.getElementById('question').value.trim();
  const options = [
    document.getElementById('opt0').value.trim(),
    document.getElementById('opt1').value.trim(),
    document.getElementById('opt2').value.trim()
  ];
  const answer = parseInt(document.getElementById('answer').value);

  if(!question || options.some(o=>!o) || isNaN(answer) || answer < 0 || answer > 2) {
    alert("Заполните все поля корректно!");
    return;
  }

  tasks.push({question, options, answer});
  document.getElementById('question').value = '';
  document.getElementById('opt0').value = '';
  document.getElementById('opt1').value = '';
  document.getElementById('opt2').value = '';
  document.getElementById('answer').value = '';

  currentTask = tasks.length - 1;
  selectedAnswer = null;
  score = 0;
  document.getElementById("score").textContent = score;
  renderSidebar();
  renderTask();
  document.getElementById("checkBtn").style.display = "inline-block";
}

// Рендер боковой панели
function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = '';
  tasks.forEach((t,index)=>{
    const btn = document.createElement('button');
    btn.textContent = "Задание " + (index+1);
    btn.className = index === currentTask ? 'active' : '';
    btn.onclick = ()=> {currentTask=index; selectedAnswer=null; renderTask(); updateSidebar();};
    sidebar.appendChild(btn);
  });
}

// Обновление активной кнопки
function updateSidebar(){
  const buttons = document.querySelectorAll('.sidebar button');
  buttons.forEach((btn,index)=>{
    btn.classList.toggle('active', index===currentTask);
  });
}

// Рендер текущего задания
function renderTask() {
  if(tasks.length===0){
    document.getElementById('task').innerHTML="<h2>Добавьте задание в редакторе</h2>";
    document.getElementById("checkBtn").style.display="none";
    return;
  }
  const taskEl = document.getElementById('task');
  const task = tasks[currentTask];
  taskEl.innerHTML=`<h2>${task.question}</h2>`;
  const optionsDiv = document.createElement('div');
  optionsDiv.className='options';
  task.options.forEach((opt,index)=>{
    const btn = document.createElement('button');
    btn.textContent=opt;
    btn.onclick = ()=> selectAnswer(index);
    optionsDiv.appendChild(btn);
  });
  taskEl.appendChild(optionsDiv);
}

// Выбор ответа
function selectAnswer(index){
  selectedAnswer=index;
  const buttons=document.querySelectorAll('.options button');
  buttons.forEach((btn,i)=> btn.style.backgroundColor=i===index ? '#1e90ff' : '');
}

// Проверка ответа
function checkAnswer(){
  if(selectedAnswer===null) { alert("Выберите ответ!"); return; }
  if(selectedAnswer===tasks[currentTask].answer) {
    score++;
    document.getElementById("score").textContent=score;
  }
  selectedAnswer=null;
  if(currentTask<tasks.length-1){
    currentTask++;
    renderTask();
    updateSidebar();
  } else {
    alert("Все задания выполнены! Результат: "+score+"/"+tasks.length);
  }
}

// Инициализация
renderTask();
</script>

</body>
</html>
